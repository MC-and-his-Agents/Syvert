name: Governance Gate

on:
  pull_request:
    branches:
      - main

jobs:
  governance-gate:
    name: Validate Governance Tooling
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run governance gate
        run: |
          set -euo pipefail
          python3 scripts/governance_gate.py \
            --mode ci \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}"

      - name: Run governance tests
        run: |
          set -euo pipefail
          python3 -m unittest discover -s tests/governance -p 'test_*.py'

      - name: Setup Go for actionlint
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.5"

      - name: Lint workflows
        run: |
          set -euo pipefail
          export GOBIN="$RUNNER_TEMP/bin"
          mkdir -p "$GOBIN"
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.8
          "$GOBIN/actionlint" .github/workflows/*.yml
