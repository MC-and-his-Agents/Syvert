name: Governance Gate

on:
  pull_request:
    branches:
      - main

jobs:
  governance-gate:
    name: Validate Governance Tooling
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run governance gate
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          python3 scripts/workflow_guard.py --mode ci
          python3 scripts/governance_gate.py             --mode ci             --base-sha "$PR_BASE_SHA"             --head-sha "$PR_HEAD_SHA"             --head-ref "$PR_HEAD_REF"
          python3 .loom/bin/loom_init.py verify --target .
          python3 .loom/bin/loom_flow.py governance-profile status --target . > /tmp/loom-governance-profile-status.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("/tmp/loom-governance-profile-status.json").read_text(encoding="utf-8"))
          maturity = (payload.get("maturity") or {}).get("current")
          if maturity != "strong":
              raise SystemExit(f"Loom governance profile maturity must be strong, got {maturity!r}")
          PY
          python3 .loom/bin/loom_flow.py runtime-parity validate --target .
          python3 .loom/bin/loom_flow.py shadow-parity --target .
          python3 .loom/bin/loom_flow.py shadow-parity --target . --blocking

      - name: Run governance tests
        run: |
          set -euo pipefail
          python3 -m unittest discover -s tests/governance -p 'test_*.py'

      - name: Setup Go for actionlint
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.5"

      - name: Lint workflows
        run: |
          set -euo pipefail
          export GOBIN="$RUNNER_TEMP/bin"
          mkdir -p "$GOBIN"
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.8
          "$GOBIN/actionlint" .github/workflows/*.yml
