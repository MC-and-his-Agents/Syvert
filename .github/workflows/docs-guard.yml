name: Docs Guard

on:
  pull_request:
    branches:
      - main
    paths:
      - "**/*.md"
      - "scripts/**/*.py"
      - "scripts/**/*.json"
      - ".githooks/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"

jobs:
  docs-guard:
    name: Validate Docs And Guard Scripts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run docs guard
        run: |
          set -euo pipefail
          python3 scripts/docs_guard.py --mode ci
