name: Work Item
description: 创建可进入执行回合的本地事项。
title: "工作项："
body:
  - type: input
    id: issue_context
    attributes:
      label: 上位 Issue / FR
      description: 填当前 work item 绑定的 canonical issue / FR 编号。
      placeholder: "#123"
    validations:
      required: true

  - type: input
    id: item_key
    attributes:
      label: item_key
      description: 使用 `<item_type>-<4-digit>-<slug>` 命名。
      placeholder: FR-0123-content-detail-runtime
    validations:
      required: true

  - type: dropdown
    id: item_type
    attributes:
      label: item_type
      options:
        - FR
        - HOTFIX
        - GOV
        - CHORE
    validations:
      required: true

  - type: input
    id: release
    attributes:
      label: release
      placeholder: v0.2.0
    validations:
      required: true

  - type: input
    id: sprint
    attributes:
      label: sprint
      placeholder: sprint-contract-harness
    validations:
      required: true

  - type: textarea
    id: execution_goal
    attributes:
      label: 执行目标
      description: 说明本次 work item 的交付边界、验证方式和回滚方式。
      placeholder: |
        交付目标：
        验证方式：
        回滚方式：
    validations:
      required: true

  - type: dropdown
    id: shared_contract_changed
    attributes:
      label: shared_contract_changed
      options:
        - "no"
        - "yes"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        `Integration` 字段必须满足以下约束：
        - `integration_touchpoint != none` 时，`integration_ref` 不得为空或 `none`，且必须指向可核查的具体 integration issue / item。
        - `external_dependency != none`、`joint_acceptance_needed=yes` 或 `contract_surface != none` 时，`integration_touchpoint` 不得为 `none`，且 `merge_gate` 必须为 `integration_check_required`。
        - 纯本仓库事项必须显式写 `integration_touchpoint=none`、`integration_ref=none`、`external_dependency=none`、`contract_surface=none`、`joint_acceptance_needed=no`、`merge_gate=local_only`。

  - type: checkboxes
    id: integration_guardrails
    attributes:
      label: Integration Guardrails
      options:
        - label: 我已按上述 integration 组合约束核对本 Work Item，当前填写值不存在互相冲突的元数据。
          required: true

  - type: dropdown
    id: integration_touchpoint
    attributes:
      label: integration_touchpoint
      options:
        - none
        - check_required
        - active
        - blocked
        - resolved
    validations:
      required: true

  - type: input
    id: integration_ref
    attributes:
      label: integration_ref
      description: 填具体 integration issue / item 链接或编号（例如 `#123`、`owner/repo#123`、issue URL 或带 `itemId=` 的 project item URL）；纯本仓库事项写 `none`。
    validations:
      required: true

  - type: dropdown
    id: external_dependency
    attributes:
      label: external_dependency
      options:
        - none
        - syvert
        - webenvoy
        - both
    validations:
      required: true

  - type: dropdown
    id: merge_gate
    attributes:
      label: merge_gate
      description: 纯本仓库事项选 `local_only`；跨仓事项选 `integration_check_required`。
      options:
        - local_only
        - integration_check_required
    validations:
      required: true

  - type: dropdown
    id: contract_surface
    attributes:
      label: contract_surface
      options:
        - none
        - execution_provider
        - ids_trace
        - errors
        - raw_normalized
        - diagnostics_observability
        - runtime_modes
    validations:
      required: true

  - type: dropdown
    id: joint_acceptance_needed
    attributes:
      label: joint_acceptance_needed
      options:
        - "no"
        - "yes"
    validations:
      required: true
