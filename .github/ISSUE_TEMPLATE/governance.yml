name: Governance Work Item
description: 创建 `item_type=GOV` 的治理工作项，不引入新的 GitHub 层级。
title: "治理工作项："
labels:
  - governance
body:
  - type: markdown
    attributes:
      value: |
        此表单是 `Work Item` 的治理专用快捷入口，仍按既有 `Phase / FR / Work Item` 调度层级收口。

  - type: input
    id: issue_context
    attributes:
      label: 上位 Issue / FR
      description: 填当前治理工作项绑定的 canonical issue / FR 编号。
      placeholder: "#105"
    validations:
      required: true

  - type: input
    id: item_key
    attributes:
      label: item_key
      description: 使用 `GOV-<4-digit>-<slug>` 命名。
      placeholder: GOV-0105-integration-governance-baseline
    validations:
      required: true

  - type: dropdown
    id: item_type
    attributes:
      label: item_type
      options:
        - GOV
    validations:
      required: true

  - type: input
    id: release
    attributes:
      label: release
      placeholder: governance-baseline
    validations:
      required: true

  - type: input
    id: sprint
    attributes:
      label: sprint
      placeholder: integration-governance
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: 治理目标
      description: 说明要调整的治理载体、为什么现在需要改、成功标准是什么。
      placeholder: |
        当前问题：
        目标状态：
        成功标准：
    validations:
      required: true

  - type: textarea
    id: affected_surfaces
    attributes:
      label: 影响载体
      description: 列出将受影响的 workflow / review / template / GitHub project 载体。
      placeholder: |
        WORKFLOW.md
        code_review.md
        PULL_REQUEST_TEMPLATE.md
        Project fields
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        `Integration` 字段必须满足以下约束：
        - `integration_touchpoint != none` 时，`integration_ref` 不得为空或 `none`，且必须指向可核查的具体 integration issue / item。
        - `external_dependency != none`、`joint_acceptance_needed=yes` 或 `contract_surface != none` 时，`integration_touchpoint` 不得为 `none`，且 `merge_gate` 必须为 `integration_check_required`。
        - 纯本仓库事项必须显式写 `integration_touchpoint=none`、`integration_ref=none`、`external_dependency=none`、`contract_surface=none`、`joint_acceptance_needed=no`、`merge_gate=local_only`。

  - type: checkboxes
    id: integration_guardrails
    attributes:
      label: Integration Guardrails
      options:
        - label: 我已按上述 integration 组合约束核对本治理工作项，当前填写值不存在互相冲突的元数据。
          required: true

  - type: dropdown
    id: shared_contract_changed
    attributes:
      label: shared_contract_changed
      options:
        - "no"
        - "yes"
    validations:
      required: true

  - type: dropdown
    id: integration_touchpoint
    attributes:
      label: integration_touchpoint
      options:
        - none
        - check_required
        - active
        - blocked
        - resolved
    validations:
      required: true

  - type: input
    id: integration_ref
    attributes:
      label: integration_ref
      description: 填具体 integration issue / item 链接或编号（例如 `#123`、`owner/repo#123`、issue URL 或带 `itemId=` 的 project item URL）；纯本仓库事项写 `none`。
    validations:
      required: true

  - type: dropdown
    id: external_dependency
    attributes:
      label: external_dependency
      options:
        - none
        - syvert
        - webenvoy
        - both
    validations:
      required: true

  - type: dropdown
    id: merge_gate
    attributes:
      label: merge_gate
      description: 纯本仓库事项选 `local_only`；跨仓事项选 `integration_check_required`。
      options:
        - local_only
        - integration_check_required
    validations:
      required: true

  - type: dropdown
    id: contract_surface
    attributes:
      label: contract_surface
      options:
        - none
        - execution_provider
        - ids_trace
        - errors
        - raw_normalized
        - diagnostics_observability
        - runtime_modes
    validations:
      required: true

  - type: dropdown
    id: joint_acceptance_needed
    attributes:
      label: joint_acceptance_needed
      options:
        - "no"
        - "yes"
    validations:
      required: true
