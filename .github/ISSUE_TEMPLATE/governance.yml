name: Governance Work Item
description: 创建 `item_type=GOV` 的治理工作项，不引入新的 GitHub 层级。
title: "治理工作项："
labels:
  - governance
body:
  - type: markdown
    attributes:
      value: |
        此表单是 `Work Item` 的治理专用快捷入口，仍按既有 `Phase / FR / Work Item` 调度层级收口。

  - type: input
    id: item_key
    attributes:
      label: item_key
      description: 使用 `GOV-<4-digit>-<slug>` 命名。
      placeholder: GOV-0105-integration-governance-baseline
    validations:
      required: true

  - type: dropdown
    id: item_type
    attributes:
      label: item_type
      options:
        - GOV
    validations:
      required: true

  - type: input
    id: release
    attributes:
      label: release
      placeholder: governance-baseline
    validations:
      required: true

  - type: input
    id: sprint
    attributes:
      label: sprint
      placeholder: integration-governance
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: 治理目标
      description: 说明要调整的治理载体、为什么现在需要改、成功标准是什么。
      placeholder: |
        当前问题：
        目标状态：
        成功标准：
    validations:
      required: true

  - type: textarea
    id: affected_surfaces
    attributes:
      label: 影响载体
      description: 列出将受影响的 workflow / review / template / GitHub project 载体。
      placeholder: |
        WORKFLOW.md
        code_review.md
        PULL_REQUEST_TEMPLATE.md
        Project fields
    validations:
      required: true

  - type: dropdown
    id: shared_contract_changed
    attributes:
      label: shared_contract_changed
      options:
        - "no"
        - "yes"
    validations:
      required: true

  - type: dropdown
    id: integration_touchpoint
    attributes:
      label: integration_touchpoint
      options:
        - none
        - check_required
        - active
        - blocked
        - resolved
    validations:
      required: true

  - type: input
    id: integration_ref
    attributes:
      label: integration_ref

  - type: dropdown
    id: external_dependency
    attributes:
      label: external_dependency
      options:
        - none
        - syvert
        - webenvoy
        - both
    validations:
      required: true

  - type: dropdown
    id: merge_gate
    attributes:
      label: merge_gate
      options:
        - local_only
        - integration_check_required
    validations:
      required: true

  - type: dropdown
    id: contract_surface
    attributes:
      label: contract_surface
      options:
        - none
        - execution_provider
        - ids_trace
        - errors
        - raw_normalized
        - diagnostics_observability
        - runtime_modes
    validations:
      required: true

  - type: dropdown
    id: joint_acceptance_needed
    attributes:
      label: joint_acceptance_needed
      options:
        - "no"
        - "yes"
    validations:
      required: true
